<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 400px; padding: 15px; font-family: Arial, sans-serif; }
    h3 { margin: 0 0 10px 0; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 12px; }
    .btn { margin-top: 10px; padding: 8px 16px; cursor: pointer; }
    .hint { color: #666; font-size: 12px; margin-top: 5px; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h3>带 URL 的 BibTeX</h3>
  <textarea id="bibtex" placeholder="请先在 Google Scholar 页面点击扩展图标..."></textarea>
  <button class="btn" id="copyBtn">复制到剪贴板</button>
  <div id="status"></div>
  <p class="hint">提示：在 Google Scholar 搜索结果页面使用</p>
  <script src="popup.js"></script>
</body>
</html>
